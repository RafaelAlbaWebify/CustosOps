version: 2

updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:15"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(python)
    groups:
      python-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:45"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(frontend)
    groups:
      frontend-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(actions)
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
