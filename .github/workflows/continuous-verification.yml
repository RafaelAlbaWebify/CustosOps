name: Continuous Verification

on:
  push:
    branches:
      - master
      - agent/**
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Backend, frontend and browser smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-ci.log 2>&1 &
          echo $! > ../backend-ci.pid

      - name: Wait for backend health
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health > backend-health.json; then
              cat backend-health.json
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy."
          cat backend-ci.log || true
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev -- --host 127.0.0.1 > ../frontend-ci.log 2>&1 &
          echo $! > ../frontend-ci.pid

      - name: Wait for frontend
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5173 > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Frontend did not become available."
          cat frontend-ci.log || true
          exit 1

      - name: Run Playwright smoke test
        working-directory: frontend
        env:
          CUSTOSOPS_BASE_URL: http://127.0.0.1:5173
        run: npm run test:e2e

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custosops-continuous-verification
          if-no-files-found: warn
          retention-days: 14
          path: |
            backend-ci.log
            frontend-ci.log
            backend-health.json
            frontend/playwright-report/
            frontend/test-results/
