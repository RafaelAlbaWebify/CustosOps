name: Continuous Verification

on:
  push:
    branches:
      - master
      - agent/**
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: custosops-verification-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-linux:
    name: Linux backend, frontend and browser verification
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee ../backend-test.log

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Record frontend lockfile drift
        shell: bash
        run: git diff -- frontend/package-lock.json > frontend-lockfile-drift.patch || true

      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../frontend-build.log

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-ci.log 2>&1 &
          echo $! > ../backend-ci.pid

      - name: Wait for backend health
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health > backend-health.json; then
              cat backend-health.json
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy."
          cat backend-ci.log || true
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev -- --host 127.0.0.1 > ../frontend-ci.log 2>&1 &
          echo $! > ../frontend-ci.pid

      - name: Wait for frontend
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5173 > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Frontend did not become available."
          cat frontend-ci.log || true
          exit 1

      - name: Run Playwright workspace and SOC workflow audit
        working-directory: frontend
        env:
          CUSTOSOPS_BASE_URL: http://127.0.0.1:5173
        run: npm run test:e2e

      - name: Upload Linux verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custosops-linux-verification
          if-no-files-found: warn
          retention-days: 14
          path: |
            backend-test.log
            frontend-build.log
            backend-ci.log
            frontend-ci.log
            backend-health.json
            frontend-lockfile-drift.patch
            frontend/playwright-report/
            frontend/test-results/

  verify-windows:
    name: Windows scripts and cross-platform build verification
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Failures = @()
          $Files = Get-ChildItem -Path . -Filter *.ps1 -Recurse -File |
            Where-Object { $_.FullName -notmatch '[\\/](node_modules|\.venv|dist|reports)[\\/]' }

          foreach ($File in $Files) {
            $Tokens = $null
            $Errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($File.FullName, [ref]$Tokens, [ref]$Errors)

            if ($Errors.Count -gt 0) {
              foreach ($ParseError in $Errors) {
                $Failures += "{0}:{1}:{2}: {3}" -f $File.FullName, $ParseError.Extent.StartLineNumber, $ParseError.Extent.StartColumnNumber, $ParseError.Message
              }
            }
          }

          "PowerShell files checked: $($Files.Count)" | Tee-Object -FilePath powershell-syntax.log

          if ($Failures.Count -gt 0) {
            $Failures | Tee-Object -FilePath powershell-syntax.log -Append
            throw "PowerShell syntax validation failed."
          }

          "PowerShell syntax validation passed." | Tee-Object -FilePath powershell-syntax.log -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend tests on Windows
        working-directory: backend
        shell: pwsh
        run: |
          python -m pytest -q 2>&1 | Tee-Object -FilePath ../backend-test-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend on Windows
        working-directory: frontend
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath ../frontend-build-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custosops-windows-verification
          if-no-files-found: warn
          retention-days: 14
          path: |
            powershell-syntax.log
            backend-test-windows.log
            frontend-build-windows.log