name: Synchronize Frontend Lockfile

on:
  push:
    branches:
      - agent/continuous-verification-baseline
    paths:
      - .github/workflows/sync-lockfile.yml
      - frontend/package.json
      - frontend/package-lock.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/continuous-verification-baseline

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate package lock
        working-directory: frontend
        run: |
          rm -f package-lock.json
          npm install --package-lock-only

      - name: Commit regenerated lockfile
        shell: bash
        run: |
          if git diff --quiet -- frontend/package-lock.json; then
            echo "Lockfile already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          git commit -m "Synchronize frontend package lock"
          git push origin HEAD:agent/continuous-verification-baseline
