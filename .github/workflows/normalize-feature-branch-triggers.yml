name: Normalize feature branch workflow triggers

on:
  push:
    branches:
      - agent/continuous-verification-baseline
    paths:
      - .github/workflows/normalize-feature-branch-triggers.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/continuous-verification-baseline

      - name: Remove duplicate feature-branch push triggers
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('.github/workflows/continuous-verification.yml'),
              Path('.github/workflows/dependency-audit.yml'),
              Path('.github/workflows/supply-chain-inventory.yml'),
          ]
          needle = '      - agent/**\n'
          for path in paths:
              text = path.read_text(encoding='utf-8')
              if needle not in text:
                  raise SystemExit(f'{path}: expected agent/** trigger not found')
              path.write_text(text.replace(needle, '', 1), encoding='utf-8')
              print(f'Normalized {path}')
          PY
          rm .github/workflows/normalize-feature-branch-triggers.yml

      - name: Commit normalized workflows
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/continuous-verification.yml \
                  .github/workflows/dependency-audit.yml \
                  .github/workflows/supply-chain-inventory.yml \
                  .github/workflows/normalize-feature-branch-triggers.yml
          git commit -m "Avoid duplicate feature branch workflow runs"
          git push origin HEAD:agent/continuous-verification-baseline
